name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Setup Java (Android build ke liye)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 Clean install (FIX for tailwind/native error)
      - name: Clean install dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      # 🔥 Rebuild native modules
      - name: Rebuild dependencies
        run: npm rebuild

      # 🔥 Ensure env exists (Vite issue fix)
      - name: Create empty env
        run: echo "" > .env

      # Build web app
      - name: Build project
        run: npm run build

      # Install Capacitor
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli

      # Init Capacitor (skip if already exists)
      - name: Init Capacitor
        run: npx cap init pos.app com.pos.app --web-dir=dist || true

      # Add Android platform
      - name: Add Android
        run: npx cap add android || true

      # Copy files
      - name: Copy files
        run: npx cap copy

      # Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
