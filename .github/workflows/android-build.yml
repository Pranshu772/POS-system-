          name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repo checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Java setup (required for Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Install dependencies
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Build web app
      - name: Build project
        run: npm run build

      # Install Capacitor
      - name: Install Capacitor
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # Init Capacitor (only if needed)
      - name: Init Capacitor
        run: npx cap init pos.app com.pos.app --web-dir=dist || true

      # Add Android platform (only if needed)
      - name: Add Android
        run: npx cap add android || true

      # Copy build files
      - name: Copy files
        run: npx cap copy

      # Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
